<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home Library Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Szybki styl dla formularzy generowanych przez Django */
        form p { margin-bottom: 1rem; }
        form p label { font-weight: bold; margin-bottom: 0.5rem; display: inline-block; }
        form p input, form p select, form p textarea {
            display: block; width: 100%; padding: 0.375rem 0.75rem;
            border: 1px solid #ced4da; border-radius: 0.375rem;
        }
        .helptext { font-size: 0.875em; color: #6c757d; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">📚 Moja Biblioteka</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Strona Główna</a></li>
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'book_add' %}">➕ Dodaj Książkę</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'dictionaries' %}">⚙️ Zarządzaj Słownikami</a></li>
                    {% endif %}
                </ul>
                <span class="navbar-text">
                    {% if user.is_authenticated %}
                        Witaj, <strong>{{ user.username }}</strong>!
                        <form action="{% url 'logout' %}" method="post" class="d-inline ms-2">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger">Wyloguj</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-sm btn-primary">🔑 Zaloguj się</a>
                        <a href="{% url 'register' %}" class="btn btn-sm btn-outline-light ms-2">Rejestracja</a>
                    {% endif %}
                </span>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
